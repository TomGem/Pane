<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient - subtle dark texture -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </linearGradient>

    <!-- Bar gradients - each column gets its own color shift for depth -->
    <linearGradient id="bar1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="50%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#93a3fc"/>
      <stop offset="50%" stop-color="#7074f0"/>
      <stop offset="100%" stop-color="#5558e8"/>
    </linearGradient>

    <!-- Highlight/shine gradients for 3D glass effect -->
    <linearGradient id="shine1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="30%" stop-color="white" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shine2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.4"/>
      <stop offset="30%" stop-color="white" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Subtle shadow for bars -->
    <filter id="shadow">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>

    <!-- Clip for rounded background -->
    <clipPath id="bgClip">
      <rect width="512" height="512" rx="108"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <g clip-path="url(#bgClip)">
    <rect width="512" height="512" fill="url(#bg)"/>

    <!-- Subtle radial light from top-left for depth -->
    <radialGradient id="ambientLight" cx="0.25" cy="0.15" r="0.85">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <rect width="512" height="512" fill="url(#ambientLight)"/>

    <!-- Three columns with 3D effect -->
    <g filter="url(#shadow)">
      <!-- Left bar - tallest -->
      <rect x="80" y="88" width="96" height="336" rx="20" fill="url(#bar1)"/>
      <rect x="80" y="88" width="96" height="336" rx="20" fill="url(#shine1)"/>
      <!-- Left edge highlight -->
      <rect x="80" y="88" width="4" height="336" rx="2" fill="white" opacity="0.15"/>

      <!-- Middle bar - shortest -->
      <rect x="208" y="184" width="96" height="240" rx="20" fill="url(#bar2)"/>
      <rect x="208" y="184" width="96" height="240" rx="20" fill="url(#shine2)"/>
      <rect x="208" y="184" width="4" height="240" rx="2" fill="white" opacity="0.15"/>

      <!-- Right bar - medium -->
      <rect x="336" y="128" width="96" height="296" rx="20" fill="url(#bar3)"/>
      <rect x="336" y="128" width="96" height="296" rx="20" fill="url(#shine1)"/>
      <rect x="336" y="128" width="4" height="296" rx="2" fill="white" opacity="0.15"/>
    </g>

    <!-- Subtle bottom reflection/glow -->
    <radialGradient id="bottomGlow" cx="0.5" cy="1.0" r="0.5">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <rect width="512" height="512" fill="url(#bottomGlow)"/>
  </g>
</svg>
