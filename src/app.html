<!doctype html>
<html lang="en" data-theme="light">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="color-scheme" content="light dark" />
		<link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/favicon.svg" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<script>
			// Apply persisted theme, palette, and font immediately to prevent flash
			(function () {
				var d = document.documentElement;
				var stored = localStorage.getItem('theme-mode');
				var theme = 'light';
				if (stored === 'dark') {
					theme = 'dark';
				} else if (stored === 'light') {
					theme = 'light';
				} else {
					theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
				}
				d.setAttribute('data-theme', theme);
				var palette = localStorage.getItem('palette');
				if (palette) d.setAttribute('data-palette', palette);
				var font = localStorage.getItem('font');
				if (font) {
					d.setAttribute('data-font', font);
					var fontMap = { fira: "'Fira Sans', system-ui, sans-serif", inter: "'Inter', system-ui, sans-serif", ubuntu: "'Ubuntu', system-ui, sans-serif" };
					if (fontMap[font]) d.style.setProperty('--font-sans', fontMap[font]);
				}
				var monoFont = localStorage.getItem('mono-font');
				if (monoFont) {
					d.setAttribute('data-mono-font', monoFont);
					var monoMap = { 'fira-code': "'Fira Code', ui-monospace, monospace", jetbrains: "'JetBrains Mono', ui-monospace, monospace", 'source-code': "'Source Code Pro', ui-monospace, monospace" };
					if (monoMap[monoFont]) d.style.setProperty('--font-mono', monoMap[monoFont]);
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
