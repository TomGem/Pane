services:
  pane:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - BODY_SIZE_LIMIT=Infinity
      # - ORIGIN=http://localhost:3000

      # Auth mode: set to 'true' for single-user (no login required)
      # - SINGLE_USER=true

      # SMTP configuration for email verification and sharing notifications
      # - SMTP_HOST=smtp.example.com
      # - SMTP_PORT=587
      # - SMTP_USER=your@email.com
      # - SMTP_PASS=your-password
      # - SMTP_FROM=Pane <noreply@example.com>
      # - SMTP_SECURE=false
    restart: unless-stopped
