services:
  pane:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      - ./storage:/app/storage
    env_file:
      - .env
    environment:
      - HOST=0.0.0.0
      - PORT=3000
      - BODY_SIZE_LIMIT=Infinity
      # - ORIGIN=http://localhost:3000
    restart: unless-stopped
